version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
      # Majors land in their own PR so each Next/React/Supabase bump gets a
      # focused review.
      major:
        update-types:
          - major
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
    groups:
      actions:
        update-types:
          - patch
          - minor
          - major
    commit-message:
      prefix: ci
      include: scope
