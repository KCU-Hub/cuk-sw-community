name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Cache .next
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Test files never reach the build output — exclude so test edits
          # don't bust the cache.
          key: ${{ runner.os }}-nextcache-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'next.config.ts', 'tsconfig.json', 'postcss.config.mjs', '!src/**/__tests__/**', '!src/**/*.test.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextcache-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextcache-

      - name: Install deps
        run: npm ci

      # Next build only inlines NEXT_PUBLIC_* into the bundle; server/proxy
      # clients validate creds at request time, never at build.
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://build-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build
